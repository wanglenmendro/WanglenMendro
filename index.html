<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanglen News</title>

<style>
body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #f5f5f5;
}

/* Header */
header {
    background: white;
    text-align: center;
    padding: 30px;
    border-bottom: 4px solid black;
    position: sticky;
    top: 0;
}

header h1 {
    margin: 0;
    font-size: 50px;
    letter-spacing: 2px;
}

/* Layout */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* Artikel */
.article {
    background: white;
    margin-bottom: 40px;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    transform: translateY(50px);
    opacity: 0;
    transition: 0.6s;
}

.article.show {
    transform: translateY(0);
    opacity: 1;
}

.article img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    margin-bottom: 15px;
}

.article h2 {
    margin-top: 0;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: white;
    border-top: 2px solid black;
}
</style>

</head>

<body>

<header>
    <h1>Wanglen News</h1>
</header>

<div class="container">

    <div class="article">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
        <h2>Breaking News</h2>
        <p>Heute wurde meine erste eigene Website veröffentlicht. Sie sieht aus wie eine echte Zeitung!</p>
    </div>

    <div class="article">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
        <h2>Fitness Update 💪</h2>
        <p>Mein Training läuft besser denn je. Fortschritt steigt jede Woche.</p>
    </div>

    <div class="article">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
        <h2>Schule & Alltag</h2>
        <p>Auch Schule läuft stabil – Balance ist wichtig.</p>
    </div>

</div>

<footer>
    © 2026 Wanglen News
</footer>

<script>
const articles = document.querySelectorAll('.article');

window.addEventListener('scroll', () => {
    articles.forEach(article => {
        const position = article.getBoundingClientRect().top;
        const screenPosition = window.innerHeight / 1.2;

        if(position < screenPosition) {
            article.classList.add('show');
        }
    });
});
</script>

</body>
</html>
